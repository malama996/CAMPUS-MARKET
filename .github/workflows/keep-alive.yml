name: Keep Render Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health check
        run: |
          curl -sS -o /dev/null -w "Status: %{http_code}\n" https://campus-market-r4y4.onrender.com/health