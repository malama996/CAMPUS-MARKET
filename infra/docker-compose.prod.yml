version: '3.9'

# Production stack for a single host or VM
# Uses the existing Dockerfiles and a dedicated NGINX reverse proxy.

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    env_file:
      - ../backend/.env
    environment:
      - NODE_ENV=production
    expose:
      - '4000'
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    env_file:
      - ../frontend/.env.local
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    expose:
      - '3000'
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

networks:
  default:
    name: campus-market-prod-net